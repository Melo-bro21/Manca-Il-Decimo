<ion-content fullscreen class="forgot-password-page">
  <div class="forgot-password-background">
    <div class="forgot-password-overlay"></div>

    <main class="forgot-password-content">
      <button
        type="button"
        class="back-button"
        routerLink="/login"
        aria-label="Torna al login"
      >
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <section class="forgot-password-header">
        <h1>Recupera password</h1>

        <p>
          Inserisci la tua email e ti invieremo un link per reimpostare la
          password.
        </p>
      </section>

      <section class="forgot-password-card">
        <div class="input-box">
          <ion-icon name="mail-outline"></ion-icon>

          <ion-input
            type="email"
            placeholder="Email account"
            autocomplete="email"
            [(ngModel)]="email"
          ></ion-input>
        </div>

        <p
          class="app-feedback app-feedback-error"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </p>

        <p
          class="app-feedback app-feedback-success"
          *ngIf="successMessage"
        >
          {{ successMessage }}
        </p>

        <ion-button
          expand="block"
          class="main-button"
          [disabled]="isLoading"
          (click)="requestResetLink()"
        >
          {{ isLoading ? 'Invio link...' : 'Invia link di recupero' }}
        </ion-button>

        <button
          type="button"
          class="secondary-button"
          routerLink="/login"
        >
          Torna al login
        </button>
      </section>
    </main>
  </div>
</ion-content>
