<ion-content fullscreen class="checkout-page">
  <main class="checkout-shell">
    <header class="checkout-header">
      <button class="back-button" (click)="goBack()"><ion-icon name="arrow-back-outline"></ion-icon></button>
      <h1>Conferma partecipazione</h1>
      <span class="header-spacer"></span>
    </header>

    <section class="checkout-card">
      <div *ngIf="isLoading">Caricamento...</div>

      <div *ngIf="!isLoading">
        <section class="checkout-section">
          <h2>Riepilogo Partita</h2>
          <p><strong>{{ match.dayLabel }}</strong> · {{ match.time }}</p>
          <p>{{ match.centerName }}</p>
          <span class="match-type">{{ match.type }}</span>
        </section>

        <p class="app-feedback-error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <section class="checkout-actions">
          <button class="confirm-button" [disabled]="isConfirming" (click)="confirmJoin()">
            {{ isConfirming ? 'Conferma in corso...' : 'Conferma e partecipa' }}
          </button>
          <button class="cancel-button" (click)="cancel()">Annulla</button>
        </section>
      </div>
    </section>
  </main>
</ion-content>
