<ion-content fullscreen class="reset-password-page">
  <div class="reset-password-background">
    <div class="reset-password-overlay"></div>

    <main class="reset-password-content">
      <button
        type="button"
        class="back-button"
        routerLink="/forgot-password"
        aria-label="Torna al recupero password"
      >
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <section class="reset-password-header">
        <h1>Nuova password</h1>

        <p>
          Inserisci e conferma la tua nuova password. Il link può essere usato
          una sola volta.
        </p>
      </section>

      <section class="reset-password-card">
        <div class="input-box">
          <ion-icon name="lock-closed-outline"></ion-icon>

          <ion-input
            [type]="passwordInputType"
            placeholder="Nuova password"
            autocomplete="new-password"
            [(ngModel)]="newPassword"
          ></ion-input>

          <ion-icon
            name="eye-outline"
            class="eye-icon"
            (click)="togglePasswordVisibility()"
          ></ion-icon>
        </div>

        <div class="input-box">
          <ion-icon name="lock-closed-outline"></ion-icon>

          <ion-input
            [type]="passwordInputType"
            placeholder="Conferma password"
            autocomplete="new-password"
            [(ngModel)]="confirmPassword"
          ></ion-input>
        </div>

        <p
          class="app-feedback app-feedback-error"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </p>

        <p
          class="app-feedback app-feedback-success"
          *ngIf="successMessage"
        >
          {{ successMessage }}
        </p>

        <ion-button
          expand="block"
          class="main-button"
          [disabled]="isLoading || !hasValidToken"
          (click)="resetPassword()"
        >
          {{ isLoading ? 'Aggiornamento...' : 'Salva nuova password' }}
        </ion-button>

        <button
          type="button"
          class="secondary-button"
          routerLink="/login"
        >
          Torna al login
        </button>
      </section>
    </main>
  </div>
</ion-content>
